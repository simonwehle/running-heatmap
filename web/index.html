<!doctype html>
<html>
  <head>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <script src="https://loc8.us/maplibre-gl-vector-text-protocol/dist/maplibre-gl-vector-text-protocol.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      const map = new maplibregl.Map({
        container: "map",
        style:
          window.MAPLIBRE_STYLE || "https://demotiles.maplibre.org/style.json",
        center: [0, 0],
        zoom: 2,
      });

      maplibregl.addProtocol("gpx", VectorTextProtocol.VectorTextProtocol);

      map.on("load", async () => {
        try {
          const response = await fetch("/api/gpx");
          const gpxFiles = await response.json();

          gpxFiles.forEach((file, index) => {
            const sourceName = file;
            const link = `gpx://${file}`;

            map.addSource(sourceName, {
              type: "geojson",
              data: link,
            });

            map.addLayer({
              id: `${sourceName}-line`,
              type: "line",
              source: sourceName,
              paint: {
                "line-opacity": 0.6,
                "line-color": "red",
                "line-width": 2,
              },
            });
          });

          console.log(`Loaded ${gpxFiles.length} GPX tracks`);
        } catch (error) {
          console.error("Error loading GPX files:", error);
        }
      });
    </script>
  </body>
</html>
