<!doctype html>
<html>
  <head>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <script src="https://loc8.us/maplibre-gl-vector-text-protocol/dist/maplibre-gl-vector-text-protocol.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      const map = new maplibregl.Map({
        container: "map",
        style: "{{.MapStyle}}",
        center: [10, 50],
        zoom: 6,
      });

      map.on("load", async () => {
        try {
          const response = await fetch("/api/heatmap");
          const geojson = await response.json();

          map.addSource("tracks-source", {
            type: "geojson",
            data: geojson,
          });

          map.addLayer({
            id: "tracks-glow",
            type: "line",
            source: "tracks-source",
            paint: {
              "line-color": [
                "interpolate",
                ["linear"],
                ["get", "count"],
                1,
                "rgb(30, 144, 255)",
                10,
                "rgb(90, 180, 255)",
                50,
                "rgb(160, 220, 255)",
                100,
                "rgb(210, 240, 255)",
              ],
              "line-width": [
                "interpolate",
                ["linear"],
                ["zoom"],
                8,
                ["interpolate", ["linear"], ["get", "count"], 1, 1.5, 100, 4],
                12,
                ["interpolate", ["linear"], ["get", "count"], 1, 2.5, 100, 6],
                16,
                ["interpolate", ["linear"], ["get", "count"], 1, 3.5, 100, 8],
              ],
              "line-opacity": [
                "interpolate",
                ["linear"],
                ["get", "count"],
                1,
                0.35,
                20,
                0.5,
                100,
                0.6,
              ],
              "line-blur": [
                "interpolate",
                ["linear"],
                ["zoom"],
                8,
                1.4,
                12,
                1.0,
                18,
                0.8,
              ],
            },
          });

          map.addLayer({
            id: "tracks-core",
            type: "line",
            source: "tracks-source",
            paint: {
              "line-color": [
                "interpolate",
                ["linear"],
                ["get", "count"],
                1,
                "rgb(30, 144, 255)",
                10,
                "rgb(70, 170, 255)",
                50,
                "rgb(120, 200, 255)",
                100,
                "rgb(180, 225, 255)",
              ],
              "line-width": [
                "interpolate",
                ["linear"],
                ["zoom"],
                8,
                ["interpolate", ["linear"], ["get", "count"], 1, 0.6, 100, 2.2],
                12,
                ["interpolate", ["linear"], ["get", "count"], 1, 0.9, 100, 2.8],
                16,
                ["interpolate", ["linear"], ["get", "count"], 1, 1.2, 100, 3.4],
              ],
              "line-opacity": [
                "interpolate",
                ["linear"],
                ["get", "count"],
                1,
                0.65,
                20,
                0.8,
                100,
                0.95,
              ],
              "line-blur": 0,
            },
          });

          console.log(`Loaded heatmap with ${geojson.features.length} tracks`);
        } catch (error) {
          console.error("Error loading heatmap:", error);
        }
      });
    </script>
  </body>
</html>
